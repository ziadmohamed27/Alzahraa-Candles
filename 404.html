body{margin:0;font-family:Tajawal,Arial,sans-serif;background:#fff8ee;color:#2a160e}.site-header{position:sticky;top:0;z-index:50;background:rgba(255,252,247,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(125,80,25,.12)}.container{width:min(1180px,92vw);margin-inline:auto}.nav{min-height:72px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:inherit}.brand-logo{display:block;width:124px;height:auto}.brand-sub{font-size:10px;letter-spacing:.28em;color:#7b5135}.hero{min-height:calc(100vh - 72px);display:flex;align-items:center;background:linear-gradient(135deg,#fffaf1 0%,#f8e7ca 100%)}.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}.hero-copy h1{font-size:clamp(42px,8vw,88px);line-height:1.08;margin:.15em 0;color:#2d170c}.hero-copy em{color:#9a6126;font-style:normal}.subtitle{font-size:clamp(16px,2vw,20px);line-height:1.8;color:#5b4230}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 24px;border-radius:16px;text-decoration:none;font-weight:700}.btn-primary{background:#9b5d24;color:#fff}.btn-ghost{border:1px solid #c9a27c;color:#5a2f11;background:#fffaf4}.hero-visual{position:relative;min-height:420px}.brand-hero-card img,.hero-visual img{display:block;max-width:100%;height:auto}@media(max-width:768px){.nav{min-height:64px}.brand-logo{width:92px}.hero{min-height:auto;padding:42px 0}.hero-grid{grid-template-columns:1fr;gap:28px;text-align:center}.hero-copy{order:1}.hero-visual{order:2;min-height:300px}.hero-copy h1{font-size:44px}.hero-actions{display:grid;gap:12px}.hero-badges{justify-content:center}}

  <link rel="stylesheet" href="/assets/css/style.css">

  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(240,215,175,.4) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 10% 80%, rgba(230,200,165,.25) 0%, transparent 55%),
        var(--cream);
    }
    .page-404-card {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .page-404-flame {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 8px;
      display: block;
      animation: floatUp2 4s ease-in-out infinite;
    }
    .page-404-number {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 700;
      line-height: 1;
      color: var(--gold-dark);
      opacity: .15;
      display: block;
      margin: -16px 0 0;
      letter-spacing: -.04em;
    }
    .page-404-title {
      font-family: "El Messiri", serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 700;
      color: var(--text);
      margin: 4px 0 14px;
    }
    .page-404-desc {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.85;
      margin-bottom: 36px;
    }
    .page-404-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .page-404-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
      opacity: .4;
    }
    .page-404-divider::before,
    .page-404-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold);
    }
    .page-404-divider span { font-size: .85rem; color: var(--muted); }
    .page-404-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .page-404-links a {
      font-size: .88rem;
      color: var(--gold-dark);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .page-404-links a:hover { color: var(--text); }
  </style>
  <link rel="canonical" href="https://siraj-candles.netlify.app/404.html">
  <link rel="stylesheet" href="/assets/css/ux-v11-cleanup.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <span></span>
      <a class="brand" href="./index.html">
        <img class="brand-logo" src="/assets/images/brand/siraj-logo-256.webp" width="256" height="256" alt="SIRAJ Candles logo" decoding="async">
        <span class="brand-title sr-only">SIRAJ</span>
        <span class="brand-sub">LIGHT WITH SOUL</span>
      </a>
      <a class="icon-btn cart-btn" href="./cart.html" aria-label="السلة">
        <span class="cart-emoji">🛍️</span>
        <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </header>

  <main class="page-404" role="main">
    <div class="page-404-card" data-reveal>
      <span class="page-404-flame" aria-hidden="true">🕯️</span>
      <span class="page-404-number" aria-hidden="true">404</span>

      <h1 class="page-404-title">هذه الصفحة غير موجودة</h1>
      <p class="page-404-desc">
        يبدو أن الصفحة التي تبحث عنها انطفأت مثل شمعة في الريح.<br>
        لكن لا تقلق — متجرنا لا يزال مضيئًا!
      </p>

      <div class="page-404-actions">
        <a href="./index.html" class="btn btn-primary">العودة للرئيسية</a>
        <a href="./index.html#products" class="btn btn-ghost">تصفح المنتجات</a>
      </div>

      <div class="page-404-divider"><span>أو انتقل إلى</span></div>

      <nav class="page-404-links" aria-label="روابط سريعة">
        <a href="./cart.html">🛍️ السلة</a>
        <a href="./login.html">🔑 تسجيل الدخول</a>
        <a href="https://wa.me/201095314011" target="_blank" rel="noopener">💬 واتساب</a>
        <a href="./my-orders.html">📦 طلباتي</a>
      </nav>
    </div>
  </main>

  <script>
    // Cart count
    try {
      const c = JSON.parse(localStorage.getItem('candles-cart') || '[]');
      const el = document.getElementById('cartCount');
      if (el) el.textContent = c.reduce((s, i) => s + (Number(i.qty) || 0), 0);
    } catch {}

    // Header scroll shadow
    const hdr = document.querySelector('.site-header');
    window.addEventListener('scroll', () => hdr?.classList.toggle('scrolled', window.scrollY > 20), { passive: true });

    // Reveal animation
    setTimeout(() => {
      document.querySelectorAll('[data-reveal]').forEach(el => el.classList.add('revealed'));
    }, 80);
  </script>
  <script defer src="/assets/js/scroll-fix.js"></script>
</body>
