<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | Alzahraa Candles</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#A07840">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=El+Messiri:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="admin-login-page">
    <section class="admin-login-card auth-card">
      <div class="admin-login-head">
        <a class="brand auth-brand" href="./index.html">
          <span class="brand-title">Alzahraa Candles</span>
          <span class="brand-sub">HANDMADE · LUXURY</span>
        </a>
        <span class="pill small" style="margin-top:8px">تسجيل الدخول</span>
        <h1>أهلاً بعودتك</h1>
        <p>سجّل دخولك لمتابعة طلباتك وإدارة حسابك بسهولة.</p>
      </div>

      <label class="admin-field">
        <span>البريد الإلكتروني</span>
        <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
      </label>

      <label class="admin-field">
        <span>كلمة المرور</span>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </label>

      <button id="loginBtn" type="button" class="admin-primary-btn">تسجيل الدخول</button>

      <p id="loginMsg" class="admin-login-msg" aria-live="polite"></p>

      <div class="auth-links">
        <span>ليس لديك حساب؟</span>
        <a href="./signup.html" class="auth-link">إنشاء حساب جديد</a>
      </div>

      <a href="./index.html" class="btn btn-ghost admin-back-btn">العودة للمتجر</a>
    </section>
  </main>

  <script src="./site-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-config.js"></script>
  <script>
    const sb = createAuthClient();
    const emailEl    = document.getElementById('loginEmail');
    const passwordEl = document.getElementById('loginPassword');
    const loginBtn   = document.getElementById('loginBtn');
    const msgEl      = document.getElementById('loginMsg');

    function setMsg(text, type = '') {
      msgEl.textContent = text;
      msgEl.className = `admin-login-msg ${type}`.trim();
    }

    (async function checkSession() {
      const { data } = await sb.auth.getSession();
      if (data.session) {
        const dest = new URLSearchParams(location.search).get('redirect') || './account.html';
        window.location.href = dest;
      }
    })();

    async function handleLogin() {
      const email    = emailEl.value.trim();
      const password = passwordEl.value;
      if (!email || !password) { setMsg('اكتب البريد الإلكتروني وكلمة المرور', 'is-error'); return; }
      loginBtn.disabled = true;
      loginBtn.textContent = 'جارٍ تسجيل الدخول...';
      setMsg('');
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        setMsg(authErrorMessage(error), 'is-error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'تسجيل الدخول';
        return;
      }
      setMsg('تم تسجيل الدخول بنجاح ✓', 'is-success');
      const dest = new URLSearchParams(location.search).get('redirect') || './account.html';
      setTimeout(() => { window.location.href = dest; }, 600);
    }

    loginBtn.addEventListener('click', handleLogin);
    passwordEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
    emailEl.addEventListener('keydown',    (e) => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
