<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>طلباتي | الزّهراء</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#d78aa7">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="icon-btn menu-btn" href="./index.html" aria-label="العودة للرئيسية">
        <span></span><span></span><span></span>
      </a>
      <a class="brand" href="./index.html">
        <span class="brand-title">الزّهراء</span>
        <span class="brand-sub">AL-ZHRAA MODEST WEAR</span>
      </a>
      <div class="nav-end-group">
        <span id="accountNavWrap"></span>
        <a class="icon-btn cart-btn" href="./cart.html" aria-label="السلة">
          <span class="cart-emoji">🛍️</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="account-page section">
    <div class="container">
      <div class="cart-page-head" style="margin-bottom:28px">
        <div>
          <span class="pill small">طلباتي</span>
          <h1>سجل طلباتي</h1>
          <p>جميع طلباتك المسجلة عبر الموقع في مكان واحد، مع تفاصيل اللون والمقاس لكل قطعة.</p>
        </div>
        <div class="account-head-actions">
          <a href="./account.html" class="btn btn-ghost">حسابي</a>
          <a href="./index.html#products" class="btn btn-primary">تسوق الآن</a>
        </div>
      </div>

      <div id="ordersContainer">
        <div class="admin-empty">
          <span style="font-size:2rem">🌿</span>
          <p style="margin-top:10px">جارٍ تحميل طلباتك...</p>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="./site-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./site-config.js"></script>
  <script src="./auth-config.js"></script>
  <script src="./catalog-data.js"></script>
  <script>
    const sb = createAuthClient();
    const WHATSAPP_NUMBER = '201095314011';
    const $ = (s) => document.querySelector(s);

    async function initAccountNav() {
      if (typeof renderAccountNav === 'function') {
        await renderAccountNav({ wrapSelector: '#accountNavWrap', supabase: sb });
      }
    }

    function updateCartCount() {
      try {
        const raw = localStorage.getItem('soap-cart');
        const cart = raw ? JSON.parse(raw) : [];
        const count = Array.isArray(cart) ? cart.reduce((s, i) => s + (Number(i.qty) || 0), 0) : 0;
        const el = $('#cartCount');
        if (el) el.textContent = count;
      } catch {}
    }


    function showToast(message) {
      const toast = $('#toast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function money(v) {
      return `${Number(v || 0).toFixed(2)} ج.م`;
    }

    function escHtml(str) {
      if (typeof str !== 'string') return String(str ?? '');
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function formatDate(iso) {
      if (!iso) return '—';
      try {
        return new Date(iso).toLocaleDateString('ar-EG', { year:'numeric', month:'short', day:'numeric' });
      } catch { return iso; }
    }

    function statusLabel(s) {
      const map = { pending:'قيد المراجعة', confirmed:'تم التأكيد', processing:'قيد التجهيز', delivered:'تم التوصيل', cancelled:'ملغى' };
      return map[s] || s || '—';
    }
    function statusClass(s) {
      const map = { pending:'is-pending', confirmed:'is-confirmed', processing:'is-processing', delivered:'is-delivered', cancelled:'is-cancelled' };
      return map[s] || '';
    }

    function buildItemsList(items) {
      if (!Array.isArray(items) || !items.length) return '<p style="color:var(--muted)">لا توجد تفاصيل منتجات.</p>';
      return items.map(i => {
        const bits = [];
        if (i.color_name) bits.push(`اللون: ${escHtml(i.color_name)}`);
        if (i.size_label) bits.push(`المقاس: ${escHtml(i.size_label)}`);
        if (i.weight) bits.push(escHtml(i.weight));
        const metaLine = bits.join(' · ');
        return `
        <div class="admin-detail-item">
          <div>
            <strong>${escHtml(i.name || '—')}</strong>
            ${metaLine ? `<div style="color:var(--muted);font-size:.9rem">${metaLine}</div>` : ''}
            <div style="color:var(--muted);font-size:.9rem">الكمية: ${escHtml(String(i.qty || 1))} × ${money(i.price)}</div>
          </div>
          <strong style="margin-right:auto">${money((i.price || 0) * (i.qty || 1))}</strong>
        </div>
      `;
      }).join('');
    }

    function buildWhatsAppLink(order) {
      const msg = `مرحبًا، أريد الاستفسار عن طلبي رقم: ${order.order_number || order.id}`;
      return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
    }
    function getProductImageUrl(imagePath) {
      return window.ZahraaCatalog.getPublicImageUrl(imagePath);
    }

    function normalizeReorderItem(product, variant, qty) {
      const images = window.ZahraaCatalog.getImagesForColor(product, variant?.color_name);
      const image = images[0]?.image_url || product.cover_image || '';
      return window.ZahraaCatalog.makeCartItem(product, variant, Math.max(1, Number(qty) || 1), image);
    }

    async function reorderOrder(orderId) {
      const order = (window.__ordersCache || []).find((item) => String(item.id) === String(orderId));
      if (!order) {
        showToast('تعذر العثور على الطلب');
        return;
      }

      const previousItems = Array.isArray(order.items_json) ? order.items_json : [];
      const productIds = [...new Set(previousItems
        .map((item) => Number(item?.product_id ?? item?.id))
        .filter((id) => Number.isFinite(id)))];
      const variantIds = [...new Set(previousItems
        .map((item) => Number(item?.variant_id))
        .filter((id) => Number.isFinite(id)))];

      if (!productIds.length) {
        showToast('لا توجد منتجات قابلة لإعادة الطلب لهذا الطلب');
        return;
      }

      const { data: products, error: productsError } = await sb
        .from('products')
        .select('id, slug, name, category, short_description, description, long_description, fabric, care_note, size_guide, sort_order, is_active')
        .in('id', productIds)
        .eq('is_active', true);

      if (productsError) {
        console.error('[Reorder] failed to load products', productsError);
        showToast('تعذر تجهيز الطلب الآن');
        return;
      }

      const { data: variants, error: variantsError } = await sb
        .from('product_variants')
        .select('id, product_id, size_label, color_name, color_hex, price, compare_price, stock_quantity, sku, sort_order, is_active')
        .in('product_id', productIds)
        .eq('is_active', true);

      if (variantsError) {
        console.error('[Reorder] failed to load variants', variantsError);
        showToast('تعذر تجهيز الطلب الآن');
        return;
      }

      const { data: images, error: imagesError } = await sb
        .from('product_images')
        .select('id, product_id, color_name, image_path, alt_text, sort_order, is_active')
        .in('product_id', productIds)
        .eq('is_active', true);

      if (imagesError) {
        console.error('[Reorder] failed to load images', imagesError);
        showToast('تعذر تجهيز الطلب الآن');
        return;
      }

      const catalog = (window.ZahraaCatalog.normalizeCatalog || ((p,v,i)=>[]))(products || [], variants || [], images || []);
      const productMap = new Map(catalog.map((product) => [String(product.id), product]));
      const variantMap = new Map();
      catalog.forEach((product) => {
        (product.variants || []).forEach((variant) => variantMap.set(String(variant.id), { product, variant }));
      });

      const rebuiltCart = [];
      const missingItems = [];

      previousItems.forEach((item) => {
        const productId = String(item?.product_id ?? item?.id ?? '');
        const variantId = String(item?.variant_id ?? '');

        if (variantId && variantMap.has(variantId)) {
          const { product, variant } = variantMap.get(variantId);
          rebuiltCart.push(normalizeReorderItem(product, variant, item?.qty));
          return;
        }

        const product = productMap.get(productId);
        if (!product) {
          missingItems.push(item?.name || `#${item?.id || '—'}`);
          return;
        }

        const fallbackVariant = (product.variants || []).find((variant) => variant.stock_quantity > 0) || product.variants?.[0];
        if (!fallbackVariant) {
          missingItems.push(item?.name || product.name || `#${item?.id || '—'}`);
          return;
        }

        rebuiltCart.push(normalizeReorderItem(product, fallbackVariant, item?.qty));
      });

      if (!rebuiltCart.length) {
        showToast('هذا الطلب يحتوي على منتجات غير متاحة حاليًا');
        return;
      }

      localStorage.setItem('soap-cart', JSON.stringify(rebuiltCart));

      if (missingItems.length) {
        showToast('تمت إضافة المنتجات المتاحة فقط من الطلب السابق');
      } else {
        showToast('تمت إعادة تجهيز الطلب في السلة');
      }

      setTimeout(() => {
        window.location.href = './cart.html';
      }, 350);
    }

    function renderOrders(orders) {
      const container = $('#ordersContainer');
      if (!container) return;
      window.__ordersCache = Array.isArray(orders) ? orders : [];

      if (!orders || !orders.length) {
        container.innerHTML = `
          <div class="admin-empty">
            <span style="font-size:2.5rem">🛍️</span>
            <p style="margin-top:12px">لا توجد طلبات مسجلة بعد.</p>
            <a href="./index.html#products" class="btn btn-primary" style="margin-top:14px;display:inline-flex">ابدأ التسوق</a>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="admin-orders-list">${orders.map(order => `
        <article class="admin-order-card">
          <div class="myorders-top">
            <div>
              <strong class="myorders-number">${escHtml(order.order_number || `#${order.id}`)}</strong>
              <span class="admin-status-badge ${statusClass(order.status)}">${escHtml(statusLabel(order.status))}</span>
            </div>
            <span class="admin-order-date">${formatDate(order.created_at)}</span>
          </div>

          <div class="myorders-meta">
            <span>الإجمالي: <strong class="price">${money(order.total)}</strong></span>
            ${order.city ? `<span>المحافظة: <strong>${escHtml(order.city)}</strong></span>` : ''}
          </div>

          <div class="admin-detail-items" style="margin-top:12px">
            ${buildItemsList(order.items_json)}
          </div>

          <div class="admin-order-actions" style="margin-top:12px">
            <button type="button" class="btn btn-primary btn-sm" data-action="reorder-order" data-order-id="${escHtml(String(order.id))}">
              إعادة الطلب
            </button>
            <a href="${buildWhatsAppLink(order)}" target="_blank" rel="noopener"
               class="btn btn-whatsapp btn-sm">
              متابعة الطلب عبر واتساب
            </a>
          </div>
        </article>
      `).join('')}</div>`;
    }

    async function init() {
      updateCartCount();
      await initAccountNav();

      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = './login.html?redirect=' + encodeURIComponent('./my-orders.html');
        return;
      }

      const { data: orders, error } = await sb
        .from('orders')
        .select('id, order_number, status, total, city, items_json, created_at')
        .eq('user_id', session.user.id)
        .order('created_at', { ascending: false });

      if (error) {
        $('#ordersContainer').innerHTML = `
          <div class="admin-empty admin-empty.is-error">
            <p>تعذر تحميل الطلبات. أعد المحاولة لاحقًا.</p>
          </div>`;
        return;
      }

      renderOrders(orders);
    }

    document.addEventListener('click', (event) => {
      const reorderBtn = event.target.closest('[data-action="reorder-order"]');
      if (!reorderBtn) return;
      reorderOrder(reorderBtn.dataset.orderId);
    });

    init();
  </script>
</body>
</html>
