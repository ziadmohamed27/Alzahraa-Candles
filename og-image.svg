<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF5EE"/>
      <stop offset=".5" stop-color="#F5EBD8"/>
      <stop offset="1" stop-color="#EBDAC8"/>
    </linearGradient>
    <linearGradient id="ogJar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9EEE0"/>
      <stop offset="1" stop-color="#D8A878"/>
    </linearGradient>
    <linearGradient id="ogFlame" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0" stop-color="#FFF4A0"/>
      <stop offset=".5" stop-color="#F0A830"/>
      <stop offset="1" stop-color="#D06820"/>
    </linearGradient>
    <radialGradient id="ogGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFD060" stop-opacity=".5"/>
      <stop offset="1" stop-color="#FFD060" stop-opacity="0"/>
    </radialGradient>
    <filter id="ogBlur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="ogSoftBlur"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>

  <!-- Subtle texture circles -->
  <circle cx="980" cy="120" r="220" fill="#F2D8B8" opacity=".3"/>
  <circle cx="100" cy="520" r="200" fill="#E8C8A0" opacity=".2"/>
  <circle cx="600" cy="315" r="400" fill="#FFF0DC" opacity=".15"/>

  <!-- Gold rule lines for luxury feel -->
  <line x1="80" y1="40" x2="1120" y2="40" stroke="#C9A46A" stroke-width="1" opacity=".35"/>
  <line x1="80" y1="590" x2="1120" y2="590" stroke="#C9A46A" stroke-width="1" opacity=".35"/>

  <!-- Corner ornaments -->
  <rect x="72" y="32" width="16" height="16" fill="none" stroke="#C9A46A" stroke-width="1.5" opacity=".5"/>
  <rect x="1112" y="32" width="16" height="16" fill="none" stroke="#C9A46A" stroke-width="1.5" opacity=".5"/>
  <rect x="72" y="582" width="16" height="16" fill="none" stroke="#C9A46A" stroke-width="1.5" opacity=".5"/>
  <rect x="1112" y="582" width="16" height="16" fill="none" stroke="#C9A46A" stroke-width="1.5" opacity=".5"/>

  <!-- Left side: candle illustration -->
  <!-- Glow halo -->
  <ellipse cx="310" cy="290" rx="120" ry="120" fill="url(#ogGlow)" filter="url(#ogBlur)"/>

  <!-- Candle body -->
  <rect x="225" y="330" width="175" height="235" rx="38" fill="url(#ogJar)"/>
  <rect x="240" y="343" width="14" height="200" rx="7" fill="white" opacity=".2"/>
  <rect x="216" y="318" width="193" height="22" rx="11" fill="#C89060"/>
  <ellipse cx="312" cy="320" rx="89" ry="11" fill="#F4DCBC"/>

  <!-- Wick -->
  <line x1="310" y1="320" x2="307" y2="278" stroke="#4A2C14" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Flame glow -->
  <ellipse cx="308" cy="260" rx="34" ry="44" fill="#FFD060" opacity=".4" filter="url(#ogSoftBlur)"/>

  <!-- Flame -->
  <path d="M308 225 C293 241 286 258 289 273 C292 287 300 296 308 297 C316 296 324 287 327 273 C330 258 323 241 308 225Z" fill="url(#ogFlame)"/>
  <path d="M308 237 C298 249 294 263 296 274 C298 283 303 289 308 290 C313 289 318 283 320 274 C322 263 318 249 308 237Z" fill="#FFF8C0" opacity=".9"/>
  <circle cx="308" cy="230" r="4.5" fill="white" opacity=".7"/>

  <!-- Label band -->
  <rect x="225" y="435" width="175" height="56" fill="white" opacity=".15"/>
  <line x1="225" y1="435" x2="400" y2="435" stroke="#C89060" stroke-width="1" opacity=".45"/>
  <line x1="225" y1="491" x2="400" y2="491" stroke="#C89060" stroke-width="1" opacity=".45"/>
  <text x="312" y="457" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#7A4A20" opacity=".8" letter-spacing="3">ALZAHRAA</text>
  <text x="312" y="477" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#9A6A40" opacity=".7" letter-spacing="3">CANDLES</text>

  <!-- Shadow -->
  <ellipse cx="310" cy="572" rx="80" ry="10" fill="#B08040" opacity=".18" filter="url(#ogSoftBlur)"/>

  <!-- Right side: text content -->
  <!-- Eyebrow -->
  <line x1="550" y1="195" x2="590" y2="195" stroke="#C9A46A" stroke-width="1.5" opacity=".7"/>
  <text x="600" y="200" font-family="Georgia,serif" font-size="13" fill="#A07840" letter-spacing="4" opacity=".9">HANDMADE · LUXURY</text>

  <!-- Main headline -->
  <text x="548" y="275" font-family="Georgia,serif" font-size="58" font-weight="700" fill="#2C1810">شموع يدوية</text>
  <text x="548" y="345" font-family="Georgia,serif" font-size="58" font-weight="700" fill="#2C1810">لأجواء <tspan fill="#A07840">أدفأ</tspan></text>

  <!-- Subtitle -->
  <text x="550" y="400" font-family="Georgia,serif" font-size="22" fill="#8C7B6E" opacity=".9">شمع طبيعي · روائح مختارة · مصنوع بعناية</text>

  <!-- Divider line -->
  <line x1="550" y1="430" x2="840" y2="430" stroke="#C9A46A" stroke-width="1" opacity=".4"/>

  <!-- Feature badges -->
  <rect x="550" y="450" width="130" height="38" rx="19" fill="rgba(201,164,106,.12)" stroke="#C9A46A" stroke-width="1"/>
  <text x="615" y="474" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#A07840">🕯️ مصنوع يدويًا</text>

  <rect x="694" y="450" width="130" height="38" rx="19" fill="rgba(201,164,106,.12)" stroke="#C9A46A" stroke-width="1"/>
  <text x="759" y="474" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#A07840">🌿 شمع طبيعي</text>

  <rect x="838" y="450" width="130" height="38" rx="19" fill="rgba(201,164,106,.12)" stroke="#C9A46A" stroke-width="1"/>
  <text x="903" y="474" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#A07840">🎁 هدايا فاخرة</text>

  <!-- Brand URL -->
  <text x="550" y="555" font-family="Georgia,serif" font-size="16" fill="#A07840" opacity=".7" letter-spacing="1">alzahraa-candles.netlify.app</text>
</svg>
