<body>
  <main class="admin-login-page">
    <section class="admin-login-card">
      <div class="admin-login-head">
        <a class="brand auth-brand" href="./index.html">
          <img class="brand-logo" src="/assets/images/brand/siraj-logo-256.webp" width="256" height="256" alt="SIRAJ Candles logo" decoding="async">
          <span class="brand-title sr-only">SIRAJ</span>
          <span class="brand-sub">LIGHT WITH SOUL</span>
        </a>
        <span class="pill small" style="margin-top:8px">✦ لوحة الإدارة</span>
        <h1>دخول الإدارة</h1>
        <p>لوحة داخلية لمتابعة الطلبات وتحديث الحالة وتصدير البيانات.</p>
      </div>

      <label class="admin-field">
        <span>البريد الإلكتروني</span>
        <input type="email" id="adminEmail" placeholder="name@example.com" autocomplete="email">
      </label>

      <label class="admin-field">
        <span>كلمة المرور</span>
        <input type="password" id="adminPassword" placeholder="••••••••" autocomplete="current-password">
      </label>

      <button id="adminLoginBtn" type="button" class="admin-primary-btn">دخول لوحة الإدارة</button>
      <p id="adminLoginMsg" class="admin-login-msg" aria-live="polite"></p>

      <a href="./index.html" class="btn btn-ghost admin-back-btn">العودة للمتجر</a>
    </section>
  </main>

  <script defer src="/assets/js/cache-cleanup.js"></script>
  <script defer src="./site-config.js"></script>
  <script defer src="/assets/js/app-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = window.AppConfig.createSupabaseClient();

    const emailInput    = document.getElementById('adminEmail');
    const passwordInput = document.getElementById('adminPassword');
    const loginBtn      = document.getElementById('adminLoginBtn');
    const msg           = document.getElementById('adminLoginMsg');

    function setMessage(text, type = '') {
      msg.textContent = text;
      msg.className = `admin-login-msg ${type}`.trim();
    }

    async function redirectIfAuthenticated() {
      const { data } = await supabaseClient.auth.getUser();
      if (data.user && await window.AppConfig.isAdminUser(supabaseClient, data.user)) window.location.href = './admin-orders.html';
    }

    async function handleLogin() {
      const email    = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) { setMessage('اكتب البريد الإلكتروني وكلمة المرور.', 'is-error'); return; }
      loginBtn.disabled = true;
      loginBtn.textContent = 'جارٍ تسجيل الدخول...';
      setMessage('');
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        setMessage('فشل تسجيل الدخول. تأكد من الإيميل والباسورد.', 'is-error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'دخول لوحة الإدارة';
        return;
      }

      const allowed = await window.AppConfig.isAdminUser(supabaseClient, data?.user);
      if (!allowed) {
        await supabaseClient.auth.signOut();
        setMessage('هذا الحساب ليس لديه صلاحية إدارة. فعّل role=admin في جدول profiles.', 'is-error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'دخول لوحة الإدارة';
        return;
      }

      setMessage('تم تسجيل الدخول بنجاح ✓', 'is-success');
      setTimeout(() => { window.location.href = './admin-orders.html'; }, 500);
    }

    loginBtn.addEventListener('click', handleLogin);
    [passwordInput, emailInput].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); }));
    redirectIfAuthenticated();
  </script>
  <script defer src="/assets/js/scroll-fix.js"></script>
</body>
</html>
