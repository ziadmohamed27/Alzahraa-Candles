<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF8F0"/>
      <stop offset="1" stop-color="#F5E2CA"/>
    </linearGradient>
    <linearGradient id="jar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9EEE0"/>
      <stop offset="1" stop-color="#D8A878"/>
    </linearGradient>
    <linearGradient id="flame1" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0" stop-color="#FFF4A0"/>
      <stop offset=".5" stop-color="#F0A830"/>
      <stop offset="1" stop-color="#D06820"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFD060" stop-opacity=".55"/>
      <stop offset="1" stop-color="#FFD060" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="softBlur"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg1)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="520" cy="130" r="110" fill="#F2D8B8" opacity=".4"/>
  <circle cx="80"  cy="680" r="130" fill="#E8C8A0" opacity=".3"/>
  <circle cx="300" cy="400" r="280" fill="#FFF0DC" opacity=".2"/>

  <!-- Glow halo behind candle -->
  <ellipse cx="300" cy="340" rx="130" ry="130" fill="url(#glow1)" filter="url(#blur1)"/>

  <!-- Candle body — wide luxury jar -->
  <rect x="185" y="370" width="230" height="310" rx="50" fill="url(#jar1)"/>

  <!-- Jar highlight strip -->
  <rect x="205" y="385" width="18" height="260" rx="9" fill="white" opacity=".22"/>

  <!-- Jar rim -->
  <rect x="175" y="355" width="250" height="28" rx="14" fill="#C89060"/>

  <!-- Inner wax surface -->
  <ellipse cx="300" cy="356" rx="112" ry="14" fill="#F4DCBC"/>

  <!-- Wick -->
  <line x1="300" y1="356" x2="296" y2="292" stroke="#4A2C14" stroke-width="4" stroke-linecap="round"/>

  <!-- Flame glow -->
  <ellipse cx="297" cy="270" rx="38" ry="50" fill="#FFD060" opacity=".35" filter="url(#softBlur)"/>

  <!-- Flame body -->
  <path d="M297 220 C278 238 270 258 272 278 C274 298 284 312 297 314 C310 312 320 298 322 278 C324 258 316 238 297 220Z" fill="url(#flame1)"/>

  <!-- Flame inner bright core -->
  <path d="M297 238 C289 250 286 264 288 276 C290 288 294 295 297 296 C300 295 304 288 306 276 C308 264 305 250 297 238Z" fill="#FFF8C0" opacity=".9"/>

  <!-- Flame tip glow dot -->
  <circle cx="297" cy="232" r="5" fill="white" opacity=".7"/>

  <!-- Label band on jar -->
  <rect x="185" y="500" width="230" height="70" rx="0" fill="white" opacity=".18"/>
  <line x1="185" y1="500" x2="415" y2="500" stroke="#C89060" stroke-width="1" opacity=".4"/>
  <line x1="185" y1="570" x2="415" y2="570" stroke="#C89060" stroke-width="1" opacity=".4"/>

  <!-- Brand text on label -->
  <text x="300" y="527" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#7A4A20" opacity=".8" letter-spacing="3">ALZAHRAA</text>
  <text x="300" y="553" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#9A6A40" opacity=".7" letter-spacing="2">CANDLES</text>

  <!-- Shadow under jar -->
  <ellipse cx="300" cy="688" rx="100" ry="14" fill="#C89060" opacity=".2" filter="url(#softBlur)"/>

  <!-- Decorative gold line -->
  <line x1="90" y1="730" x2="510" y2="730" stroke="#C9A46A" stroke-width="1" opacity=".35"/>
</svg>
