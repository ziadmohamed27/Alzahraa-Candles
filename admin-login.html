<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول الإدارة | الزّهراء</title>
  <meta name="description" content="تسجيل دخول الإدارة لمتابعة طلبات الزّهراء وتحديث حالتها.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#6b9228">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="admin-login-page">
    <div class="admin-login-card">
      <div class="center">
        <h1>تسجيل دخول الإدارة</h1>
        <p class="helper">لوحة داخلية لمتابعة طلبات <strong>الزّهراء</strong>.</p>
      </div>

      <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" autocomplete="username">
      <input type="password" id="adminPassword" placeholder="كلمة المرور" autocomplete="current-password">
      <button id="adminLoginBtn" class="btn" type="button">دخول</button>
      <p id="adminLoginMsg" class="admin-login-msg"></p>
      <a href="./index.html" class="btn btn-ghost center">العودة للموقع</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://wihhfwdaysupjpfzshfq.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_UgNH99IH4aP0aLN3OhH-Vw_w2-XqO_v';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailInput = document.getElementById('adminEmail');
    const passwordInput = document.getElementById('adminPassword');
    const loginBtn = document.getElementById('adminLoginBtn');
    const msg = document.getElementById('adminLoginMsg');

    (async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        window.location.href = './admin-orders.html';
      }
    })();

    async function handleLogin() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        msg.textContent = 'اكتب البريد وكلمة المرور';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'جارٍ تسجيل الدخول...';
      msg.textContent = '';

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        msg.textContent = 'فشل تسجيل الدخول. تأكد من البيانات أو من تأكيد البريد.';
        loginBtn.disabled = false;
        loginBtn.textContent = 'دخول';
        return;
      }

      window.location.href = './admin-orders.html';
    }

    loginBtn.addEventListener('click', handleLogin);
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
