<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="100" fill="#FAF5EE"/>
  <rect width="512" height="512" rx="100" fill="url(#bg5)"/>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF5EE"/>
      <stop offset="1" stop-color="#F0E0C8"/>
    </linearGradient>
    <linearGradient id="jar5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8EAD6"/>
      <stop offset="1" stop-color="#D4A060"/>
    </linearGradient>
    <linearGradient id="fl5" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0" stop-color="#FFF090"/>
      <stop offset=".6" stop-color="#F0A020"/>
      <stop offset="1" stop-color="#C05010"/>
    </linearGradient>
    <radialGradient id="glow5" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFD060" stop-opacity=".45"/>
      <stop offset="1" stop-color="#FFD060" stop-opacity="0"/>
    </radialGradient>
    <filter id="sf5"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- Glow halo -->
  <ellipse cx="256" cy="215" rx="100" ry="100" fill="url(#glow5)" filter="url(#sf5)"/>

  <!-- Candle body -->
  <rect x="180" y="278" width="152" height="192" rx="36" fill="url(#jar5)"/>
  <!-- Highlight -->
  <rect x="200" y="292" width="18" height="158" rx="9" fill="white" opacity=".22"/>
  <!-- Rim -->
  <rect x="170" y="258" width="172" height="32" rx="16" fill="#C08848"/>
  <!-- Wax surface -->
  <ellipse cx="256" cy="260" rx="80" ry="16" fill="#F4DCBC"/>

  <!-- Wick -->
  <line x1="256" y1="260" x2="252" y2="196" stroke="#3A1C08" stroke-width="6" stroke-linecap="round"/>

  <!-- Flame glow -->
  <ellipse cx="252" cy="168" rx="42" ry="58" fill="#FFD060" opacity=".38" filter="url(#sf5)"/>

  <!-- Flame -->
  <path d="M252 110 C226 132 218 160 222 184 C226 206 240 220 252 222 C264 220 278 206 282 184 C286 160 278 132 252 110Z" fill="url(#fl5)"/>
  <path d="M252 128 C238 146 232 166 236 182 C238 195 245 204 252 205 C259 204 266 195 268 182 C272 166 266 146 252 128Z" fill="#FFFCA8" opacity=".9"/>
  <circle cx="252" cy="116" r="8" fill="white" opacity=".7"/>

  <!-- Label band -->
  <rect x="180" y="362" width="152" height="54" fill="white" opacity=".16"/>
  <line x1="180" y1="362" x2="332" y2="362" stroke="#C89060" stroke-width="1" opacity=".4"/>
  <line x1="180" y1="416" x2="332" y2="416" stroke="#C89060" stroke-width="1" opacity=".4"/>
  <text x="256" y="384" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#7A4A20" opacity=".85" letter-spacing="3">ALZAHRAA</text>
  <text x="256" y="408" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#9A6A40" opacity=".7" letter-spacing="3">CANDLES</text>

  <!-- Shadow -->
  <ellipse cx="256" cy="477" rx="80" ry="10" fill="#B08040" opacity=".15"/>
</svg>
