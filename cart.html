<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سلة التسوق | الزّهراء</title>
  <meta name="description" content="راجع منتجاتك وأكمل طلبك بسهولة من سلة التسوق في الزّهراء.">
  <meta name="theme-color" content="#6b9228">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header" id="top">
    <div class="container nav">
      <a class="icon-btn menu-btn" href="./index.html" aria-label="العودة للرئيسية">
        <span></span><span></span><span></span>
      </a>

      <a class="brand" href="./index.html">
        <span class="brand-title">الزّهراء</span>
        <span class="brand-sub">NATURAL SOAP</span>
      </a>

      <a class="icon-btn cart-btn" href="./cart.html" aria-label="فتح السلة">
        <span class="cart-emoji">🛍️</span>
        <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </header>

  <main class="cart-page">
    <section class="section">
      <div class="container">
        <div class="cart-page-head">
          <div>
            <span class="pill small">سلة التسوق</span>
            <h1>راجع طلبك قبل الإرسال</h1>
            <p>عدّل الكميات، أضف بياناتك، ثم أرسل الطلب عبر واتساب وسيتم تسجيله تلقائيًا.</p>
          </div>

          <a href="./index.html#products" class="btn btn-ghost">العودة للمنتجات</a>
        </div>

        <div id="orderSuccessBox" class="order-success-box hidden"></div>

        <div class="cart-page-layout">
          <section class="cart-page-items-wrap">
            <div class="cart-page-title-row">
              <h2>المنتجات المختارة</h2>
              <button class="btn btn-ghost btn-sm" id="clearCartBtn" type="button">تفريغ السلة</button>
            </div>

            <div id="cartPageItems" class="cart-page-items"></div>
          </section>

          <aside class="cart-page-summary">
            <div class="order-form order-form-page" id="orderForm">
              <h3>بيانات الطلب</h3>

              <div class="form-grid">
                <div class="field">
                  <label for="customerName">الاسم</label>
                  <input type="text" id="customerName" placeholder="اكتب اسمك" autocomplete="name">
                </div>

                <div class="field">
                  <label for="customerPhone">رقم الموبايل</label>
                  <input type="tel" id="customerPhone" placeholder="01xxxxxxxxx" inputmode="tel" autocomplete="tel">
                </div>

                <div class="field">
                  <label for="customerCity">المدينة / المحافظة</label>
                  <input type="text" id="customerCity" placeholder="مثال: القاهرة" autocomplete="address-level2">
                </div>

                <div class="field field-full">
                  <label for="customerNotes">ملاحظات</label>
                  <textarea id="customerNotes" rows="4" placeholder="أي تفاصيل إضافية عن الطلب أو العنوان"></textarea>
                </div>
              </div>
            </div>

            <div class="cart-page-summary-card" id="cartPageSummary"></div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./cart.js"></script>
</body>
</html>
