<body>
  <main class="admin-login-page">
    <section class="admin-login-card auth-card">
      <div class="admin-login-head">
        <a class="brand auth-brand" href="./index.html">
          <img class="brand-logo" src="/assets/images/brand/siraj-logo-256.webp" width="256" height="256" alt="SIRAJ Candles logo" decoding="async">
          <span class="brand-title sr-only">SIRAJ</span>
          <span class="brand-sub">LIGHT WITH SOUL</span>
        </a>
        <span class="pill small" style="margin-top:8px">تسجيل الدخول</span>
        <h1>أهلاً بعودتك</h1>
        <p>سجّل دخولك لمتابعة طلباتك وإدارة حسابك بسهولة.</p>
      </div>

      <label class="admin-field">
        <span>البريد الإلكتروني</span>
        <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
      </label>

      <label class="admin-field">
        <span>كلمة المرور</span>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </label>

      <button id="loginBtn" type="button" class="admin-primary-btn">تسجيل الدخول</button>

      <p id="loginMsg" class="admin-login-msg" aria-live="polite"></p>

      <div class="auth-links">
        <span>ليس لديك حساب؟</span>
        <a href="./signup.html" class="auth-link">إنشاء حساب جديد</a>
      </div>

      <a href="./index.html" class="btn btn-ghost admin-back-btn">العودة للمتجر</a>
    </section>
  </main>

  <script defer src="/assets/js/cache-cleanup.js"></script>
  <script src="./site-config.js"></script>
  <script src="/assets/js/app-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/auth-config.js"></script>
  <script>
    const sb = createAuthClient();
    const emailEl    = document.getElementById('loginEmail');
    const passwordEl = document.getElementById('loginPassword');
    const loginBtn   = document.getElementById('loginBtn');
    const msgEl      = document.getElementById('loginMsg');

    function setMsg(text, type = '') {
      msgEl.textContent = text;
      msgEl.className = `admin-login-msg ${type}`.trim();
    }

    function getSafeRedirectDest() {
      const raw = new URLSearchParams(location.search).get('redirect');
      return window.AppConfig?.safeRedirectTarget(raw, './account.html') || './account.html';
    }

    (async function checkSession() {
      const { data } = await sb.auth.getSession();
      if (data.session) {
        window.location.href = getSafeRedirectDest();
      }
    })();

    async function handleLogin() {
      const email    = emailEl.value.trim();
      const password = passwordEl.value;
      if (!email || !password) { setMsg('اكتب البريد الإلكتروني وكلمة المرور', 'is-error'); return; }
      loginBtn.disabled = true;
      loginBtn.textContent = 'جارٍ تسجيل الدخول...';
      setMsg('');
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        setMsg(authErrorMessage(error), 'is-error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'تسجيل الدخول';
        return;
      }
      setMsg('تم تسجيل الدخول بنجاح ✓', 'is-success');
      setTimeout(() => { window.location.href = getSafeRedirectDest(); }, 600);
    }

    loginBtn.addEventListener('click', handleLogin);
    passwordEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
    emailEl.addEventListener('keydown',    (e) => { if (e.key === 'Enter') handleLogin(); });
  </script>
