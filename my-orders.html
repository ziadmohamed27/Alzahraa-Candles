<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>طلباتي | الزّهراء</title>
  <meta name="description" content="تابع طلباتك السابقة من متجر الزّهراء واعرض التفاصيل والحالة والإجمالي بسهولة.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#d78aa7">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="my-orders" data-requires-auth="true">
  <header class="site-header" id="top">
    <div class="container nav">
      <a class="icon-btn menu-btn" href="./index.html" aria-label="العودة للرئيسية">
        <span></span><span></span><span></span>
      </a>
      <a class="brand" href="./index.html">
        <span class="brand-title">الزّهراء</span>
        <span class="brand-sub">AL-ZHRAA NATURAL SOAP</span>
      </a>
      <div class="nav-actions">
        <div class="auth-nav-slot" id="authNavDesktop"></div>
        <a class="icon-btn cart-btn" href="./cart.html" aria-label="فتح السلة">
          <span class="cart-emoji">🛍️</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="orders-page">
    <section class="section auth-section">
      <div class="container auth-shell">
        <div class="page-hero-card orders-hero-card">
          <span class="pill small">طلباتي</span>
          <h1>تابع طلباتك السابقة</h1>
          <p>ستجد هنا رقم الطلب، التاريخ، الحالة، الإجمالي، مع زر للتفاصيل وخيار واتساب عند الحاجة.</p>
        </div>

        <div class="orders-toolbar">
          <button class="btn btn-ghost" id="refreshOrdersBtn" type="button">تحديث الطلبات</button>
          <a class="btn btn-ghost" href="./cart.html">طلب جديد</a>
        </div>

        <div class="auth-feedback" id="ordersMessage"></div>
        <div class="orders-list" id="myOrdersList"></div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./auth.js"></script>
</body>
</html>
