<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
<meta name="description" content="الصفحة غير موجودة — عُد إلى متجر Alzahraa Candles.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>الصفحة غير موجودة | Alzahraa Candles</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#A07840">
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Alzahraa Candles">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="apple-touch-icon" href="./icon-512.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Alzahraa Candles">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=El+Messiri:wght@400;700&family=Tajawal:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=El+Messiri:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./premium.css">
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(240,215,175,.4) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 10% 80%, rgba(230,200,165,.25) 0%, transparent 55%),
        var(--cream);
    }
    .page-404-card {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .page-404-flame {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 8px;
      display: block;
      animation: floatUp2 4s ease-in-out infinite;
    }
    .page-404-number {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 700;
      line-height: 1;
      color: var(--gold-dark);
      opacity: .15;
      display: block;
      margin: -16px 0 0;
      letter-spacing: -.04em;
    }
    .page-404-title {
      font-family: "El Messiri", serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 700;
      color: var(--text);
      margin: 4px 0 14px;
    }
    .page-404-desc {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.85;
      margin-bottom: 36px;
    }
    .page-404-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .page-404-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
      opacity: .4;
    }
    .page-404-divider::before,
    .page-404-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold);
    }
    .page-404-divider span { font-size: .85rem; color: var(--muted); }
    .page-404-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .page-404-links a {
      font-size: .88rem;
      color: var(--gold-dark);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .page-404-links a:hover { color: var(--text); }
  </style>
  <link rel="canonical" href="https://alzahraa-candles.netlify.app/404.html">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <span></span>
      <a class="brand" href="./index.html">
        <span class="brand-title">Alzahraa Candles</span>
        <span class="brand-sub">HANDMADE · LUXURY</span>
      </a>
      <a class="icon-btn cart-btn" href="./cart.html" aria-label="السلة">
        <span class="cart-emoji">🛍️</span>
        <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </header>

  <main class="page-404" role="main">
    <div class="page-404-card" data-reveal>
      <span class="page-404-flame" aria-hidden="true">🕯️</span>
      <span class="page-404-number" aria-hidden="true">404</span>

      <h1 class="page-404-title">هذه الصفحة غير موجودة</h1>
      <p class="page-404-desc">
        يبدو أن الصفحة التي تبحث عنها انطفأت مثل شمعة في الريح.<br>
        لكن لا تقلق — متجرنا لا يزال مضيئًا!
      </p>

      <div class="page-404-actions">
        <a href="./index.html" class="btn btn-primary">العودة للرئيسية</a>
        <a href="./index.html#products" class="btn btn-ghost">تصفح المنتجات</a>
      </div>

      <div class="page-404-divider"><span>أو انتقل إلى</span></div>

      <nav class="page-404-links" aria-label="روابط سريعة">
        <a href="./cart.html">🛍️ السلة</a>
        <a href="./login.html">🔑 تسجيل الدخول</a>
        <a href="https://wa.me/201095314011" target="_blank" rel="noopener">💬 واتساب</a>
        <a href="./my-orders.html">📦 طلباتي</a>
      </nav>
    </div>
  </main>

  <script>
    // Cart count
    try {
      const c = JSON.parse(localStorage.getItem('candles-cart') || '[]');
      const el = document.getElementById('cartCount');
      if (el) el.textContent = c.reduce((s, i) => s + (Number(i.qty) || 0), 0);
    } catch {}

    // Header scroll shadow
    const hdr = document.querySelector('.site-header');
    window.addEventListener('scroll', () => hdr?.classList.toggle('scrolled', window.scrollY > 20), { passive: true });

    // Reveal animation
    setTimeout(() => {
      document.querySelectorAll('[data-reveal]').forEach(el => el.classList.add('revealed'));
    }, 80);
  </script>
</body>
</html>
