<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة الطلبات | Alzahraa Candles</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#A07840">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="admin-shell container">

    <section class="admin-topbar">
      <div>
        <span class="pill small">✦ لوحة الإدارة</span>
        <h1>إدارة الطلبات</h1>
        <p>فلترة متقدمة، فرز سريع، تصدير CSV، وإشارات واضحة للطلبات الجديدة والمتأخرة.</p>
      </div>
      <div class="admin-topbar-actions">
        <button id="refreshBtn" type="button" class="btn btn-ghost">🔄 تحديث</button>
        <button id="exportCsvBtn" type="button" class="btn btn-ghost">📥 تصدير CSV</button>
        <button id="logoutBtn" type="button" class="btn btn-ghost" style="color:#C0524C;border-color:rgba(192,82,76,.3)">خروج</button>
      </div>
    </section>

    <section class="admin-tools-card">
      <div class="admin-tools-grid admin-tools-grid-advanced">
        <label class="admin-search-wrap admin-span-2">
          <span>البحث</span>
          <input type="text" id="searchInput" placeholder="ابحث برقم الطلب أو الاسم أو الهاتف">
        </label>
        <label class="admin-filter-wrap">
          <span>الحالة</span>
          <select id="statusFilter">
            <option value="">كل الحالات</option>
            <option value="pending">قيد المراجعة</option>
            <option value="confirmed">تم التأكيد</option>
            <option value="processing">قيد التجهيز</option>
            <option value="delivered">تم التسليم</option>
            <option value="cancelled">ملغي</option>
          </select>
        </label>
        <label class="admin-filter-wrap">
          <span>المحافظة</span>
          <select id="cityFilter"><option value="">كل المحافظات</option></select>
        </label>
        <label class="admin-filter-wrap">
          <span>من تاريخ</span>
          <input type="date" id="dateFrom">
        </label>
        <label class="admin-filter-wrap">
          <span>إلى تاريخ</span>
          <input type="date" id="dateTo">
        </label>
        <label class="admin-filter-wrap">
          <span>الترتيب</span>
          <select id="sortSelect">
            <option value="newest">الأحدث أولاً</option>
            <option value="oldest">الأقدم أولاً</option>
            <option value="highest_total">الأعلى قيمة</option>
            <option value="lowest_total">الأقل قيمة</option>
            <option value="pending_first">المعلّقة أولاً</option>
          </select>
        </label>
      </div>
      <div class="admin-tools-actions-row">
        <button id="clearFiltersBtn" type="button" class="btn btn-ghost btn-sm">مسح الفلاتر</button>
        <div id="adminLastUpdated" class="admin-last-updated">آخر تحديث: —</div>
      </div>
    </section>

    <section id="ordersStats" class="admin-stats-grid"></section>

    <section class="admin-list-head">
      <div>
        <h2>الطلبات</h2>
        <p class="admin-list-sub">تابع الحالات، راجع التفاصيل، وصدّر النتائج الحالية عند الحاجة.</p>
      </div>
      <div class="admin-list-metrics">
        <div id="ordersCountLabel" class="admin-list-count">عدد النتائج: 0</div>
        <div id="ordersFilteredTotalLabel" class="admin-list-total admin-list-count">الإجمالي: 0.00 ج.م</div>
      </div>
    </section>

    <section id="ordersList" class="admin-orders-list"></section>

  </main>

  <script src="./site-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./admin-orders.js"></script>
</body>
</html>
