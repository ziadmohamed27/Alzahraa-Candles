<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
<meta name="description" content="لوحة إدارة طلبات متجر SIRAJ — للمشرفين فقط.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>إدارة الطلبات | SIRAJ</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#4b148c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SIRAJ">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <!-- critical-css -->
  <style>
body{margin:0;font-family:Tajawal,Arial,sans-serif;background:#fff8ee;color:#2a160e}.site-header{position:sticky;top:0;z-index:50;background:rgba(255,252,247,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(125,80,25,.12)}.container{width:min(1180px,92vw);margin-inline:auto}.nav{min-height:72px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:inherit}.brand-logo{display:block;width:124px;height:auto}.brand-sub{font-size:10px;letter-spacing:.28em;color:#7b5135}.hero{min-height:calc(100vh - 72px);display:flex;align-items:center;background:linear-gradient(135deg,#fffaf1 0%,#f8e7ca 100%)}.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}.hero-copy h1{font-size:clamp(42px,8vw,88px);line-height:1.08;margin:.15em 0;color:#2d170c}.hero-copy em{color:#9a6126;font-style:normal}.subtitle{font-size:clamp(16px,2vw,20px);line-height:1.8;color:#5b4230}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 24px;border-radius:16px;text-decoration:none;font-weight:700}.btn-primary{background:#9b5d24;color:#fff}.btn-ghost{border:1px solid #c9a27c;color:#5a2f11;background:#fffaf4}.hero-visual{position:relative;min-height:420px}.brand-hero-card img,.hero-visual img{display:block;max-width:100%;height:auto}@media(max-width:768px){.nav{min-height:64px}.brand-logo{width:92px}.hero{min-height:auto;padding:42px 0}.hero-grid{grid-template-columns:1fr;gap:28px;text-align:center}.hero-copy{order:1}.hero-visual{order:2;min-height:300px}.hero-copy h1{font-size:44px}.hero-actions{display:grid;gap:12px}.hero-badges{justify-content:center}}
</style>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SIRAJ">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=El+Messiri:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/ux-v11-cleanup.css">
</head>
<body>
  <main class="admin-shell container">

    <section class="admin-topbar">
      <div>
        <span class="pill small">✦ لوحة الإدارة</span>
        <h1>إدارة الطلبات</h1>
        <p>فلترة متقدمة، فرز سريع، تصدير CSV، وإشارات واضحة للطلبات الجديدة والمتأخرة.</p>
      </div>
      <div class="admin-topbar-actions">
        <button id="refreshBtn" type="button" class="btn btn-ghost">🔄 تحديث</button>
        <button id="exportCsvBtn" type="button" class="btn btn-ghost">📥 تصدير CSV</button>
        <button id="logoutBtn" type="button" class="btn btn-ghost" style="color:#C0524C;border-color:rgba(192,82,76,.3)">خروج</button>
      </div>
    </section>

    <section class="admin-tools-card">
      <div class="admin-tools-grid admin-tools-grid-advanced">
        <label class="admin-search-wrap admin-span-2">
          <span>البحث</span>
          <input type="text" id="searchInput" placeholder="ابحث برقم الطلب أو الاسم أو الهاتف">
        </label>
        <label class="admin-filter-wrap">
          <span>الحالة</span>
          <select id="statusFilter">
            <option value="">كل الحالات</option>
            <option value="pending">قيد المراجعة</option>
            <option value="confirmed">تم التأكيد</option>
            <option value="processing">قيد التجهيز</option>
            <option value="delivered">تم التسليم</option>
            <option value="cancelled">ملغي</option>
          </select>
        </label>
        <label class="admin-filter-wrap">
          <span>المحافظة</span>
          <select id="cityFilter"><option value="">كل المحافظات</option></select>
        </label>
        <label class="admin-filter-wrap">
          <span>من تاريخ</span>
          <input type="date" id="dateFrom">
        </label>
        <label class="admin-filter-wrap">
          <span>إلى تاريخ</span>
          <input type="date" id="dateTo">
        </label>
        <label class="admin-filter-wrap">
          <span>الترتيب</span>
          <select id="sortSelect">
            <option value="newest">الأحدث أولاً</option>
            <option value="oldest">الأقدم أولاً</option>
            <option value="highest_total">الأعلى قيمة</option>
            <option value="lowest_total">الأقل قيمة</option>
            <option value="pending_first">المعلّقة أولاً</option>
          </select>
        </label>
      </div>
      <div class="admin-tools-actions-row">
        <button id="clearFiltersBtn" type="button" class="btn btn-ghost btn-sm">مسح الفلاتر</button>
        <div id="adminLastUpdated" class="admin-last-updated">آخر تحديث: —</div>
      </div>
    </section>

    <section id="ordersStats" class="admin-stats-grid"></section>

    <section class="admin-list-head">
      <div>
        <h2>الطلبات</h2>
        <p class="admin-list-sub">تابع الحالات، راجع التفاصيل، وصدّر النتائج الحالية عند الحاجة.</p>
      </div>
      <div class="admin-list-metrics">
        <div id="ordersCountLabel" class="admin-list-count">عدد النتائج: 0</div>
        <div id="ordersFilteredTotalLabel" class="admin-list-total admin-list-count">الإجمالي: 0.00 ج.م</div>
      </div>
    </section>

    <section id="ordersList" class="admin-orders-list"></section>

  </main>

  <script defer src="/assets/js/cache-cleanup.js"></script>
  <script src="./site-config.js"></script>
  <script src="/assets/js/app-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/admin-orders.js"></script>
  <script defer src="/assets/js/scroll-fix.js"></script>
</body>
</html>
